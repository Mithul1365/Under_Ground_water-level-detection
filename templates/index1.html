<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Groundwater Level Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column; /* Changed to column to stack header, map, and dashboard */
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }
    .header {
      width: 100%;
      padding: 10px 20px;
      background-color: #f0f0f0;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .header img {
      height: 40px; /* Adjust as needed */
    }
    .header h1 {
      margin: 0;
      font-size: 1.5em;
    }
    .main-container {
      flex-grow: 1;
      display: flex;
      width: 100%;
      overflow: hidden;
    }
    #map {
      flex-grow: 1;
      height: 100%;
    }
    .dashboard {
      flex-basis: 400px;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
      box-shadow: -2px 0 5px rgba(0,0,0,0.1);
    }
    .chat-container {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      background-color: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
    }
    .chat-messages {
      flex-grow: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
    }
    .message {
      background-color: #e2e2e2;
      padding: 10px;
      border-radius: 15px;
      margin-bottom: 10px;
      align-self: flex-start;
      max-width: 80%;
      word-wrap: break-word;
    }
    .message.user {
      background-color: #007bff;
      color: #fff;
      align-self: flex-end;
    }
    .chat-input {
      display: flex;
      padding: 15px;
      border-top: 1px solid #ddd;
    }
    .chat-input input {
      flex-grow: 1;
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 10px 15px;
      outline: none;
    }
    .chat-input button {
      background-color: #007bff;
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 20px;
      margin-left: 10px;
      cursor: pointer;
    }
    .leaflet-popup-content-wrapper {
      border-radius: 8px;
    }
    .leaflet-popup-content strong {
      color: #007bff;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="C:\Users\OMEN\OneDrive\Desktop\IMG_5505.PNG" alt="Your Logo">
    <h1>JAL DRISHTI</h1>
  </div>
  <div class="main-container">
    <div id="map"></div>
    <div class="dashboard">
      <h2>Groundwater Dashboard</h2>
      <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
        </div>
        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="Type a message...">
          <button id="send-button">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([12.97, 77.59], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Load map markers
    function loadMapMarkers() {
      fetch('/map_data')
        .then(res => res.json())
        .then(points => {
          points.forEach(p => {
            const status = p.water_level < p.threshold ? '🚨 ALERT' : '✅ OK';
            const popup = `
              <strong>Station:</strong> ${p.station}<br/>
              <strong>District:</strong> ${p.district}<br/>
              <strong>Water Level:</strong> ${p.water_level} mbgl<br/>
              <strong>Threshold:</strong> ${p.threshold} mbgl<br/>
              <strong>Status:</strong> ${status}<br/>
              <strong>Date & Time:</strong> ${p.datetime}
            `;
            L.marker([p.lat, p.lon]).addTo(map).bindPopup(popup);
          });
        })
        .catch(err => console.error('Error loading map data:', err));
    }

    loadMapMarkers();

    // Chat board
    const chatInput = document.getElementById('chat-input');
    const sendButton = document.getElementById('send-button');
    const chatMessages = document.getElementById('chat-messages');

    function renderMessage(message) {
      const messageDiv = document.createElement('div');
      messageDiv.className = message.user ? 'message user' : 'message';
      messageDiv.textContent = message.text;
      chatMessages.prepend(messageDiv);
    }

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      
      fetch('/send_message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      }).then(res => res.json())
        .then(data => {
          renderMessage(data);
          chatInput.value = '';
        });
    }

    sendButton.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Optional: poll every 5 sec to get new messages
    setInterval(() => {
      fetch('/get_messages')
        .then(res => res.json())
        .then(data => {
          chatMessages.innerHTML = '';
          data.forEach(renderMessage);
        });
    }, 5000);
  </script>
</body>
</html>
